# alembic.ini — Alembic migration configuration for PrintBot v3.
#
# Run migrations from the project root:
#   alembic upgrade head       # apply all pending migrations
#   alembic downgrade -1       # revert last migration
#   alembic revision --autogenerate -m "description"   # generate new migration
#
# IMPORTANT: The actual DB URL is read from core/config.py at runtime —
# the sqlalchemy.url value below is overridden in alembic/env.py.

[alembic]
# Path to migration scripts, relative to this file's directory
script_location = alembic

# Migration file naming: timestamp + description
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Prepend sys.path so `core` package is importable during migrations
prepend_sys_path = .

# Timezone for migration timestamps in file names
timezone = UTC

# Maximum length for the slug portion of the file name
truncate_slug_length = 40

# Revision environment — alembic/env.py reads settings.DATABASE_URL
# and sets the URL dynamically, so this placeholder is never used directly.
sqlalchemy.url = sqlite+aiosqlite:///printbot.db


[post_write_hooks]
# No post-write hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
