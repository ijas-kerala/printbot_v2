[pytest]
# Disable ROS pytest plugins that are installed in the venv from the system
# ROS environment and conflict with standard test collection.
addopts = -p no:launch_testing -p no:launch_ros -p no:ament_lint -p no:ament_copyright -p no:ament_pep257 -p no:ament_flake8 -p no:ament_xmllint
testpaths = tests
