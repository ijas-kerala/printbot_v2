{% extends "base.html" %}

{% block content %}
<div class="w-full flex flex-col gap-6 animate-in fade-in slide-in-from-bottom-4 duration-700 pb-64">

    <!-- Header / File Info -->
    <div class="flex items-center gap-4 bg-white/60 p-4 rounded-2xl shadow-sm border border-white/50 backdrop-blur-sm">
        <div class="w-14 h-14 bg-white rounded-xl shadow-sm flex items-center justify-center text-2xl">
            📄
        </div>
        <div>
            <h2 class="text-lg font-bold text-slate-800">Print Setup</h2>
            <p class="text-sm text-slate-500 font-medium">Total Document Length: <span
                    class="text-brand-600 font-bold">{{ total_pages }} Pages</span></p>
        </div>
    </div>

    <form action="/print-settings" method="post" id="settingsForm" class="w-full flex flex-col gap-6">
        <!-- Hidden Inputs for Backend Logic -->
        <input type="hidden" name="file_id" value="{{ file_id }}">
        <input type="hidden" name="total_pages_original" id="originalPages" value="{{ total_pages }}">
        <input type="hidden" name="price_per_page_fallback" id="pricePerPageFallback" value="{{ price_per_page }}">
        <div id="pricingRulesData" data-rules='{{ pricing_rules | tojson | safe }}' class="hidden"></div>

        <!-- The backend expects 'page_range' to be a string like "odd", "even" or "1-5". 
             We update this hidden input based on user selection. -->
        <input type="hidden" name="page_range" id="realPageRange" value="">

        <!-- Section 1: Copies -->
        <div class="card bg-white shadow-sm border border-slate-100 rounded-3xl overflow-visible">
            <div class="card-body p-5">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-bold text-slate-700">How many copies?</h3>
                    <div class="badge badge-lg badge-primary font-bold" id="copiesBadge">1 Copy</div>
                </div>

                <div class="flex items-center gap-4 bg-slate-50 p-2 rounded-2xl">
                    <button type="button" class="btn btn-circle btn-ghost shadow-sm bg-white border border-slate-200"
                        onclick="adjustCopies(-1)">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5"
                            stroke="currentColor" class="w-6 h-6 text-slate-600">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 12h-15" />
                        </svg>
                    </button>

                    <input type="range" min="1" max="10" value="1" class="range range-lg range-primary flex-1"
                        name="copies" id="copiesRange" oninput="updatePrice()" />

                    <button type="button" class="btn btn-circle btn-ghost shadow-sm bg-white border border-slate-200"
                        onclick="adjustCopies(1)">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5"
                            stroke="currentColor" class="w-6 h-6 text-slate-600">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                        </svg>
                    </button>
                </div>
                <div class="flex justify-between text-xs text-slate-400 font-bold px-1 mt-2">
                    <span>1</span>
                    <span>10</span>
                </div>
            </div>
        </div>

        <!-- Section 2: Page Selection -->
        <div class="card bg-white shadow-sm border border-slate-100 rounded-3xl">
            <div class="card-body p-5">
                <h3 class="text-lg font-bold text-slate-700 mb-4">Which pages?</h3>

                <div class="grid grid-cols-2 gap-3">
                    <!-- Option: All -->
                    <div class="page-option relative overflow-hidden cursor-pointer group rounded-xl border-2 border-transparent bg-slate-50 hover:bg-slate-100 transition-all active:scale-95"
                        onclick="selectPageOption('all')" id="opt-all">
                        <div class="p-4 flex flex-col items-center gap-2 text-center">
                            <div
                                class="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold">
                                A</div>
                            <span class="font-bold text-slate-700">All Pages</span>
                        </div>
                        <div class="absolute inset-0 border-2 border-brand-500 rounded-xl hidden selection-ring"></div>
                        <div class="absolute top-2 right-2 text-brand-500 hidden check-icon">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd"
                                    d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                                    clip-rule="evenodd" />
                            </svg>
                        </div>
                    </div>



                    <!-- Option: Custom -->
                    <div class="page-option relative overflow-hidden cursor-pointer group rounded-xl border-2 border-transparent bg-slate-50 hover:bg-slate-100 transition-all active:scale-95"
                        onclick="selectPageOption('custom')" id="opt-custom">
                        <div class="p-4 flex flex-col items-center gap-2 text-center">
                            <div
                                class="w-10 h-10 rounded-full bg-slate-200 text-slate-600 flex items-center justify-center">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z">
                                    </path>
                                </svg>
                            </div>
                            <span class="font-bold text-slate-700">Range</span>
                        </div>
                        <div class="absolute inset-0 border-2 border-brand-500 rounded-xl hidden selection-ring"></div>
                    </div>
                </div>

                <!-- Custom Range Input (Hidden by default) -->
                <div id="customRangeContainer"
                    class="hidden mt-4 animate-in slide-in-from-top-2 bg-slate-50/50 p-4 rounded-2xl border border-slate-100 shadow-inner-sm">
                    <div class="flex justify-between items-center mb-2 px-1">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Specify
                            Pages</label>
                        <span class="text-[10px] font-bold text-slate-400">Example: 1-5, 8</span>
                    </div>

                    <div class="flex flex-col gap-3">
                        <input type="text" placeholder="Enter page numbers..."
                            class="input input-lg w-full bg-white border-2 border-brand-100 focus:border-brand-500 focus:ring-4 focus:ring-brand-500/10 focus:outline-none rounded-xl font-mono text-lg transition-all shadow-sm"
                            id="visiblePageRange" oninput="validateRangeInput()" />

                        <button type="button" onclick="applyPageRange(this)" id="applyRangeBtn"
                            class="btn btn-lg w-full rounded-xl shadow-lg shadow-indigo-200 border-none text-white font-black bg-indigo-600 hover:bg-indigo-700 active:scale-[0.95] transition-all duration-200 flex items-center justify-center gap-2 group">
                            <span class="btn-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20"
                                    fill="currentColor">
                                    <path fill-rule="evenodd"
                                        d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"
                                        clip-rule="evenodd" />
                                </svg>
                            </span>
                            <span class="btn-text">Apply Selection</span>
                        </button>
                    </div>

                    <!-- Warning/Error Messages -->
                    <div id="rangeWarning"
                        class="hidden mt-3 p-3 rounded-xl bg-amber-50 border border-amber-100 text-amber-700 text-xs font-bold animate-in fade-in duration-300">
                        <div class="flex items-start gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 flex-shrink-0 mt-0.5" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                            </svg>
                            <span id="rangeWarningText"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Section 3: Sides (Duplex) -->
        <div class="card bg-white shadow-sm border border-slate-100 rounded-3xl">
            <div class="card-body p-5">
                <h3 class="text-lg font-bold text-slate-700 mb-4">Print Sides</h3>

                <!-- Hidden checkbox for standard form submission -->
                <input type="checkbox" class="hidden" name="duplex" id="duplexCheckbox">

                <div class="grid grid-cols-2 gap-3">
                    <!-- Single Sided -->
                    <div class="side-option relative cursor-pointer rounded-xl border-2 border-transparent bg-slate-50 p-4 flex flex-col items-center transition-all active:scale-95"
                        onclick="setDuplex(false)" id="opt-simplex">
                        <div class="mb-2">📄</div> <!-- Simple icon -->
                        <span class="font-bold text-slate-700 text-sm">Single Sided</span>
                        <span class="text-[10px] text-slate-400 font-bold mt-1">STANDARD</span>
                        <div class="absolute inset-0 border-2 border-brand-500 rounded-xl hidden selection-ring"></div>
                    </div>

                    <!-- Double Sided -->
                    <div class="side-option relative cursor-pointer rounded-xl border-2 border-transparent bg-slate-50 p-4 flex flex-col items-center transition-all active:scale-95"
                        onclick="setDuplex(true)" id="opt-duplex">
                        <div class="mb-2">📑</div> <!-- Stack icon -->
                        <span class="font-bold text-slate-700 text-sm">Double Sided</span>
                        <span
                            class="text-[10px] text-green-600 font-bold mt-1 bg-green-100 px-2 py-0.5 rounded-full">SAVE
                            PAPER</span>
                        <div class="absolute inset-0 border-2 border-brand-500 rounded-xl hidden selection-ring"></div>
                        <div class="absolute top-2 right-2 text-brand-500 hidden check-icon">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd"
                                    d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"
                                    clip-rule="evenodd" />
                            </svg>
                        </div>
                    </div>
                </div>
            </div>
        </div>


        <!-- Section 4: Coupons -->
        <div class="card bg-white shadow-sm border border-slate-100 rounded-3xl">
            <div class="card-body p-5">
                <h3 class="text-lg font-bold text-slate-700 mb-2">Have a Coupon?</h3>
                <div class="flex gap-2">
                    <input type="text" name="coupon_code" placeholder="Enter Code (e.g. RETRY-123)"
                        class="input input-bordered w-full bg-slate-50 uppercase font-mono tracking-wider focus:outline-none focus:border-brand-500 rounded-xl" />
                </div>
            </div>
        </div>

    </form>
</div>

<!-- Sticky Bottom Action Bar -->
<div
    class="fixed bottom-0 left-0 w-full p-4 bg-white/80 backdrop-blur-md border-t border-slate-200 z-50 animate-in slide-in-from-bottom-full duration-500">
    <div class="max-w-md mx-auto w-full flex gap-4 items-center">
        <div class="flex-1">
            <div class="text-xs font-bold text-slate-400 uppercase tracking-wider">Total</div>
            <div class="text-3xl font-heading font-black text-slate-800 leading-none">₹<span id="displayPrice">0</span>
            </div>
            <div class="text-xs text-brand-600 font-bold mt-0.5" id="summaryText">...</div>
        </div>
        <button onclick="document.getElementById('settingsForm').submit()"
            class="btn btn-primary rounded-2xl shadow-lg shadow-brand-500/30 px-8 flex-1 text-2xl h-20 btn-animate-print text-white border-none relative overflow-hidden">
            <span class="relative z-10">Print Now </span>
            <div
                class="absolute inset-0 bg-white/20 translate-y-full hover:translate-y-0 transition-transform duration-300">
            </div>
        </button>
    </div>
</div>

<style>
    .page-option.selected,
    .side-option.selected {
        background-color: #f0fdf4;
        /* Light brand color hint, verify brand colors in real css */
        background-color: var(--brand-50, #eff6ff);
    }

    .page-option.selected .selection-ring,
    .side-option.selected .selection-ring {
        display: block;
    }

    .page-option.selected .check-icon,
    .side-option.selected .check-icon {
        display: block;
    }

    @keyframes print-pulse {
        0% {
            transform: scale(1);
            box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7);
        }

        50% {
            transform: scale(1.02);
            box-shadow: 0 0 0 10px rgba(99, 102, 241, 0);
        }

        100% {
            transform: scale(1);
            box-shadow: 0 0 0 0 rgba(99, 102, 241, 0);
        }
    }

    .btn-animate-print {
        animation: print-pulse 2s infinite;
        background-size: 200% auto;
        background-image: linear-gradient(45deg, #4f46e5 0%, #7c3aed 50%, #4f46e5 100%);
        transition: 0.5s;
    }

    .btn-animate-print:hover {
        background-position: right center;
    }
</style>

<script>
    const originalPages = parseInt(document.getElementById('originalPages').value) || 1;
    const fallbackPrice = parseFloat(document.getElementById('pricePerPageFallback').value) || 1;
    let pricingRules = [];
    try {
        pricingRules = JSON.parse(document.getElementById('pricingRulesData').getAttribute('data-rules'));
        // Sort rules by min desc to match backend logic (specific first)
        pricingRules.sort((a, b) => b.min - a.min);
    } catch (e) {
        console.error("Failed to parse pricing rules", e);
    }

    // --- Logic for Page Range Selection ---
    function selectPageOption(type) {
        // [RESTRICTION] Prevent custom range for single-page documents
        if (type === 'custom' && originalPages === 1) {
            // Visual feedback that it's not available
            return; // Do nothing
        }

        // UI Update
        document.querySelectorAll('.page-option').forEach(el => el.classList.remove('selected'));
        document.getElementById('opt-' + type).classList.add('selected');

        const realInput = document.getElementById('realPageRange');
        const customContainer = document.getElementById('customRangeContainer');
        const warningDiv = document.getElementById('rangeWarning');

        if (type === 'custom') {
            customContainer.classList.remove('hidden');
            validateRangeInput(); // Validate on open
        } else {
            customContainer.classList.add('hidden');
            warningDiv.classList.add('hidden'); // Hide warnings
            if (type === 'all') realInput.value = '';
            updatePrice();
        }
    }

    function syncCustomRange() {
        const val = document.getElementById('visiblePageRange').value;
        document.getElementById('realPageRange').value = val;
    }

    // --- Validation for Page Range Input ---
    function validateRangeInput() {
        const input = document.getElementById('visiblePageRange').value;
        const warningDiv = document.getElementById('rangeWarning');
        const warningText = document.getElementById('rangeWarningText');

        if (!input.trim()) {
            warningDiv.classList.add('hidden');
            return;
        }

        const warnings = [];
        const parts = input.split(',');

        parts.forEach(part => {
            part = part.trim();
            if (!part) return;

            // Check for invalid characters (letters, special symbols except dash)
            if (/[a-zA-Z@#$%^&*()_+=\[\]{}|;:'",<>?/\\]/.test(part)) {
                warnings.push(`Invalid characters detected`);
                return;
            }

            // Check for double dashes
            if (part.includes('--')) {
                warnings.push(`Double dash "--" not allowed`);
                return;
            }

            // Check for out-of-range pages
            const nums = part.match(/\d+/g);
            if (nums) {
                nums.forEach(num => {
                    const pageNum = parseInt(num);
                    if (pageNum > originalPages) {
                        warnings.push(`Page ${pageNum} doesn't exist (max: ${originalPages})`);
                    }
                    if (pageNum < 1) {
                        warnings.push(`Page numbers must be 1 or higher`);
                    }
                });
            }
        });

        // Show warnings
        if (warnings.length > 0) {
            // Remove duplicates
            const uniqueWarnings = [...new Set(warnings)];
            warningText.innerHTML = uniqueWarnings.join('. ');
            warningDiv.classList.remove('hidden');
            warningDiv.classList.add('text-warning');
        } else {
            warningDiv.classList.add('hidden');
        }
    }

    function applyPageRange(btn) {
        validateRangeInput();
        syncCustomRange(); // Update hidden input
        updatePrice(); // Recalculate price

        // Provide visual feedback
        if (btn) {
            const originalContent = btn.innerHTML;
            const originalBg = btn.className;

            btn.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 animate-bounce" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                </svg>
                <span>Applied!</span>
            `;
            btn.classList.add('bg-green-600', 'hover:bg-green-600');
            btn.classList.remove('bg-indigo-600', 'hover:bg-indigo-700');

            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.className = originalBg;
            }, 1500);
        }
    }

    // --- Logic for Copies ---
    function adjustCopies(delta) {
        const input = document.getElementById('copiesRange');
        let val = parseInt(input.value) || 1;
        val += delta;
        if (val < 1) val = 1;
        if (val > 10) val = 10;
        input.value = val;
        updatePrice();
    }

    // --- Logic for Duplex ---
    function setDuplex(isDouble) {
        // UI Update
        document.querySelectorAll('.side-option').forEach(el => el.classList.remove('selected'));
        if (isDouble) document.getElementById('opt-duplex').classList.add('selected');
        else document.getElementById('opt-simplex').classList.add('selected');

        // Form Update
        // The backend checks if duplex == 'on'. 
        document.getElementById('duplexCheckbox').checked = isDouble;
        updatePrice();
    }

    // --- Calculation and Estimation ---
    function updatePrice() {
        const copies = parseInt(document.getElementById('copiesRange').value) || 1;
        document.getElementById('copiesBadge').innerText = copies + (copies === 1 ? ' Copy' : ' Copies');

        // Estimate pages
        let estPages = originalPages;
        const rangeVal = document.getElementById('realPageRange').value.trim().toLowerCase();

        if (rangeVal !== '') {
            // Robust parsing: count unique valid pages only
            const validPages = new Set();
            const parts = rangeVal.split(',');

            parts.forEach(p => {
                p = p.trim();
                if (p.includes('-')) {
                    const [start, end] = p.split('-').map(n => parseInt(n.trim()));
                    if (!isNaN(start) && !isNaN(end)) {
                        const min = Math.min(start, end);
                        const max = Math.max(start, end);
                        // Only add pages that actually exist in the document
                        for (let i = min; i <= max; i++) {
                            if (i >= 1 && i <= originalPages) {
                                validPages.add(i);
                            }
                        }
                    }
                } else {
                    const page = parseInt(p);
                    if (!isNaN(page) && page >= 1 && page <= originalPages) {
                        validPages.add(page);
                    }
                }
            });

            // If the user entered something but no valid pages were found, 
            // fallback to originalPages or handle as 0 (UX choice: 0 is more honest for pricing)
            estPages = validPages.size;
        }

        // Duplex Math
        const isDuplex = document.getElementById('duplexCheckbox').checked;
        let sheetsInfo = estPages;
        if (isDuplex) {
            sheetsInfo = Math.ceil(estPages / 2);
        }

        const totalSheets = sheetsInfo * copies;

        // --- Auto-Correction for Single Page ---
        if (estPages === 1) {
            if (isDuplex) {
                // Determine if we should force switch or just calculate as 1 sheet
                // UX decision: Forcing switch is clearer to user why price is low
                setDuplex(false);
                // setDuplex calls updatePrice(), so return to avoid double run
                return;
            }
            // Disable Duplex Option Visuals
            document.getElementById('opt-duplex').classList.add('opacity-50', 'cursor-not-allowed');
            document.getElementById('opt-duplex').onclick = null; // Remove handler
        } else {
            // Re-enable
            document.getElementById('opt-duplex').classList.remove('opacity-50', 'cursor-not-allowed');
            document.getElementById('opt-duplex').onclick = function () { setDuplex(true); };
        }

        // --- Dynamic Pricing Lookup ---
        let unitPrice = fallbackPrice;

        // Find first matching rule (since we sorted by min desc)
        const rule = pricingRules.find(r => {
            if (r.is_duplex !== isDuplex) return false;
            // Check min
            if (totalSheets < r.min) return false;
            // Check max (if exists)
            if (r.max !== null && totalSheets > r.max) return false;
            return true;
        });

        if (rule) {
            unitPrice = rule.price;
        }

        const totalPrice = (totalSheets * unitPrice).toFixed(2);

        // Update Display
        document.getElementById('displayPrice').innerText = totalPrice;

        let summary = `${totalSheets} Sheets`;
        if (isDuplex) summary += ' (Double Sided)';

        // Optional: Show applied rate
        // summary += ` @ ₹${unitPrice}/sheet`;

        document.getElementById('summaryText').innerText = summary;
    }

    // Initialize
    selectPageOption('all');
    setDuplex(false);
    updatePrice();

    // [RESTRICTION] Disable custom range option for single-page documents
    if (originalPages === 1) {
        const customOption = document.getElementById('opt-custom');
        customOption.classList.add('opacity-50', 'cursor-not-allowed');
        customOption.onclick = null; // Remove click handler

        // Add tooltip hint
        const customSpan = customOption.querySelector('span');
        if (customSpan) {
            customSpan.title = 'Range selection not available for single-page documents';
        }
    }
</script>
{% endblock %}
