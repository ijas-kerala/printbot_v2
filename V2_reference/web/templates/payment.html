{% extends "base.html" %}

{% block content %}
<div class="w-full h-full flex flex-col items-center justify-center animate-in fade-in zoom-in duration-500">

    <!-- Printo Floating Head -->
    <div class="mb-4 relative">
        <div class="w-24 h-24 bg-white/80 backdrop-blur rounded-full shadow-lg p-3 animate-bounce-slight z-10 relative">
            <img src="/static/printo_idle.png" alt="Printo" class="w-full h-full object-contain" />
        </div>
        <!-- Pulse ring behind Printo -->
        <div class="absolute inset-0 rounded-full bg-brand-200 animate-ping opacity-75 z-0"></div>
    </div>

    <div class="text-center mb-6">
        <h2 class="text-2xl font-heading font-bold text-slate-700">Waiting for Payment</h2>
        <p class="text-brand-600 font-medium animate-pulse">Checking status...</p>
    </div>

    <!-- Main Payment Card -->
    <div class="card w-full glass-panel shadow-2xl rounded-3xl overflow-hidden relative">
        <div class="bg-gradient-to-r from-brand-500 to-brand-600 p-6 text-center">
            <p class="text-brand-50 text-sm uppercase tracking-wider font-bold mb-1">Total Amount</p>
            <p class="text-6xl font-heading font-black text-yellow-300 drop-shadow-sm">₹{{ amount }}</p>
        </div>

        <div class="card-body p-6 items-center text-center bg-white/50">

            <div class="mb-6">
                <button id="rzp-button1"
                    class="btn btn-primary btn-lg rounded-2xl shadow-lg shadow-brand-500/30 px-8 py-3 text-lg btn-animate-print text-white border-none relative overflow-hidden inline-flex items-center justify-center gap-2 group">
                    <span class="relative z-10 font-bold">Pay Now</span>
                    <div
                        class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300">
                    </div>
                </button>
            </div>

            <div id="payment-message" class="text-slate-500 text-sm font-medium mb-4">
                Click to open secure payment options
            </div>

            <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
            <script>
                async function verifyPaymentWithRetry(response, retries = 3) {
                    const msgEl = document.getElementById('payment-message');
                    
                    for (let attempt = 1; attempt <= retries; attempt++) {
                        try {
                            msgEl.innerText = attempt > 1 
                                ? `Verifying payment (attempt ${attempt}/${retries})...` 
                                : "Payment Successful! Verifying...";
                            
                            const res = await fetch("/verify-payment", {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({
                                    razorpay_payment_id: response.razorpay_payment_id,
                                    razorpay_order_id: response.razorpay_order_id,
                                    razorpay_signature: response.razorpay_signature
                                })
                            });
                            
                            if (res.ok) {
                                const data = await res.json();
                                msgEl.innerText = "Payment Verified! Redirecting...";
                                if (data.redirect) {
                                    window.location.href = data.redirect;
                                }
                                return; // Success — exit retry loop
                            }
                            
                            console.warn(`Verify attempt ${attempt} failed: HTTP ${res.status}`);
                        } catch (err) {
                            console.warn(`Verify attempt ${attempt} network error:`, err);
                        }
                        
                        // Wait before retrying (exponential backoff: 2s, 4s, 8s)
                        if (attempt < retries) {
                            await new Promise(r => setTimeout(r, Math.pow(2, attempt) * 1000));
                        }
                    }
                    
                    // All retries failed — show message but HTMX polling is still running as backup
                    msgEl.innerText = "Payment received! Verification slow — please wait...";
                    console.log("All verify retries exhausted. Relying on HTMX polling fallback.");
                }

                var options = {
                    "key": "{{ key_id }}",
                    "amount": "{{ (amount * 100) | int }}",
                    "currency": "INR",
                    "name": "PrintBot",
                    "description": "Print Job Payment",
                    "image": "/static/printo_idle.png",
                    "order_id": "{{ order_id }}",
                    "handler": function (response) {
                        document.getElementById('rzp-button1').style.display = 'none';
                        verifyPaymentWithRetry(response);
                    },
                    "modal": {
                        "ondismiss": function () {
                            console.log('Payment modal closed');
                        }
                    },
                    "prefill": {
                        "name": "PrintBot User",
                        "email": "guest@printbot.local"
                    },
                    "theme": {
                        "color": "#4f46e5"
                    }
                };
                var rzp1 = new Razorpay(options);
                document.getElementById('rzp-button1').onclick = function (e) {
                    rzp1.open();
                    e.preventDefault();
                }

                // Auto-open on load
                window.onload = function () {
                    rzp1.open();
                };
            </script>

            <!-- HTMX Polling (Background Verification) -->
            <div hx-get="/payment-status/{{ order_id }}" hx-trigger="every 3s" hx-swap="none" class="hidden"></div>

        </div>

        <!-- Bottom Progress Bar -->
        <div class="absolute bottom-0 left-0 w-full h-1 bg-brand-100">
            <div class="h-full bg-brand-400 w-full origin-left animate-[scale-x_3s_ease-in-out_infinite]"></div>
        </div>
    </div>

</div>

<style>
    @keyframes print-pulse {
        0% {
            transform: scale(1);
            box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7);
        }

        50% {
            transform: scale(1.05);
            box-shadow: 0 0 0 15px rgba(99, 102, 241, 0);
        }

        100% {
            transform: scale(1);
            box-shadow: 0 0 0 0 rgba(99, 102, 241, 0);
        }
    }

    .btn-animate-print {
        animation: print-pulse 2s infinite;
        background-size: 200% auto;
        background-image: linear-gradient(45deg, #4f46e5 0%, #7c3aed 50%, #4f46e5 100%);
        transition: 0.5s;
    }

    .btn-animate-print:hover {
        background-position: right center;
    }
</style>
{% endblock %}
